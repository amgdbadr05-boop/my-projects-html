<!DOCTYPE html>
<html lang="en">
<head>
    <title>log-in</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="auther" content="Amgad Badr">
</head>

<body dir="ltr">
    <fieldset>
        <legend>user registration page</legend>
        <div>
        <form>
        <label for="text">Enter your full name:</label>
        <br>
        <input id="text" type="text" required placeholder="your full name">
        </div>

        <div>
        <label for="email">Enter your email:</label>
        <br>
        <input id="email" type="email" required placeholder="your email">
        </div>

        <div>
            <label for="password">Enter your password:</label>
            <br>
            <input id="password" type="password" required placeholder="password">
        </div>

        <div>
            <label for="password">Confirm your password:</label>
            <br>
            <input id="password" type="password" required placeholder="Confirm password">
        </div>

        <div>
            <h3>Enter your gender:</h3>
            <input id="male" type="radio">
            <label for="male">male</label>
            <br>
            <input id="female" type="radio">
            <label for="female">female</label>
        </div>
        <div>
        <h3>Enter your address:</h3>
            <textarea placeholder="Eter your address" style="resize: none;"></textarea>
        </div>
        <input type="submit" value="sing-up">
        <input type="reset">
        </form>

    </fieldset>

    
</body>
</html>
